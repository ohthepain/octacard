services:
  postgres:
    image: postgres:16-alpine
    container_name: octacard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: octacard
      POSTGRES_PASSWORD: M+4FoG4IaMfbnF87ShI30RKEPnKl2qSX5WES6lFZK2w
      POSTGRES_DB: octacard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octacard -d octacard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: octacard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
