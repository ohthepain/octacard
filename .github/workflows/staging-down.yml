name: Staging Down

on:
  workflow_dispatch:
  schedule:
    # 6pm and 9pm UTC daily. Adjust for your timezone (e.g. 18:00 UTC = 1pm EST, 6pm GMT)
    - cron: "0 18 * * *"
    - cron: "0 21 * * *"

concurrency:
  group: staging-down
  cancel-in-progress: false

jobs:
  down:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEPLOY }}
          aws-region: eu-central-1
          audience: sts.amazonaws.com

      - name: Stop staging resources
        run: ./scripts/staging-down.sh
